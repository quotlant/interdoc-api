<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: "Segoe UI", sans-serif;
    height: 100vh;
    display: flex;
    overflow: hidden;
    color: white;
    background: radial-gradient(circle at top left, #7c3aed, transparent 35%),
      linear-gradient(135deg, #020617, #111827);
  }

  /* Sidebar */
  .sidebar {
    width: 300px;
    padding: 25px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    background: rgba(15, 23, 42, 0.9);
    backdrop-filter: blur(20px);
    border-right: 1px solid rgba(255, 255, 255, 0.1);
  }

  .sidebar h2 {
    font-size: 24px;
    text-align: center;
    background: linear-gradient(90deg, #38bdf8, #a78bfa);
    -webkit-background-clip: text;
    color: transparent;
  }

  .uploaded-docs {
    flex: 1;
    overflow-y: auto;
  }

  .uploaded-docs p {
    padding: 12px;
    margin-bottom: 10px;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  .upload-area {
    padding: 25px;
    text-align: center;
    border-radius: 15px;
    border: 2px dashed #38bdf8;
    cursor: pointer;
    background: rgba(56, 189, 248, 0.08);
    transition: 0.3s;
  }

  .upload-area:hover {
    background: rgba(56, 189, 248, 0.2);
    transform: scale(1.03);
  }

  /* Chat */
  .chat-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 25px;
  }

  .chat-window {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 15px;
    overflow-y: auto;
    padding: 20px;
    background: rgba(15, 23, 42, 0.6);
    border-radius: 20px;
  }

  .message {
    max-width: 70%;
    padding: 15px 20px;
    border-radius: 18px;
    line-height: 1.5;
  }

  .message.user {
    align-self: flex-end;
    background: linear-gradient(135deg, #2563eb, #7c3aed);
  }

  .message.bot {
    align-self: flex-start;
    background: rgba(255, 255, 255, 0.12);
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  .citation {
    margin-top: 10px;
    color: #38bdf8;
    font-size: 13px;
  }

  .input-area {
    margin-top: 20px;
    display: flex;
    gap: 15px;
  }

  .input-area input {
    flex: 1;
    padding: 15px;
    border-radius: 14px;
    border: none;
    outline: none;
    background: #1e293b;
    color: white;
    font-size: 16px;
  }

  .input-area button {
    padding: 15px 30px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    color: white;
    font-weight: bold;
    background: linear-gradient(135deg, #06b6d4, #8b5cf6);
  }

  .input-area button:hover {
    opacity: 0.8;
  }

  @media (max-width: 700px) {
    .sidebar {
      width: 220px;
    }

    .message {
      max-width: 90%;
    }
  }
</style>
